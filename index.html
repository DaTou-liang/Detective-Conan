<script>
  // ---------- 音效管理 (Web Audio + 降级兼容) ----------
  const SoundFX = {
    ctx: null,
    init() {
      if (this.ctx) return;
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        // 静默挂起，等待用户首次交互后激活 (iOS策略)
      } catch(e) { console.warn("Web Audio not supported"); }
    },
    playBeep(type) {
      if (!this.ctx) this.init();
      if (!this.ctx) return;
      // 用户未解锁audio context时尝试恢复（大部分移动端需要用户手势激活）
      if (this.ctx.state === 'suspended') {
        this.ctx.resume().then(() => this._generateSound(type)).catch(e=>{});
      } else {
        this._generateSound(type);
      }
    },
    _generateSound(type) {
      if (!this.ctx) return;
      const now = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
      if (type === 'door') {
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(660, now + 0.2);
        osc.frequency.setValueAtTime(880, now + 0.25);
      } else if (type === 'badge') {
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(1318, now + 0.15);
        osc.frequency.setValueAtTime(1046, now + 0.2);
      } else if (type === 'complete') {
        // 胜利旋律 三连音
        osc.frequency.setValueAtTime(587.33, now);
        osc.frequency.setValueAtTime(783.99, now + 0.12);
        osc.frequency.setValueAtTime(987.77, now + 0.24);
      } else {
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.15);
      }
      osc.start();
      osc.stop(now + 0.45);
    },
    playDoorOpen() { this.playBeep('door'); },
    playBadgeEarn() { this.playBeep('badge'); },
    playAllBadgesComplete() { this.playBeep('complete'); }
  };
  
  // 预初始化，但需用户点击任意按钮后才真正启用声音（避免自动播放策略）
  let soundEnabled = false;
  function enableSoundOnFirstUserTap() {
    if (soundEnabled) return;
    soundEnabled = true;
    SoundFX.init();
    if (SoundFX.ctx && SoundFX.ctx.state === 'suspended') {
      SoundFX.ctx.resume().catch(e=>{});
    }
  }
  // 全局监听首次触摸/点击以激活音频上下文
  document.body.addEventListener('touchstart', () => enableSoundOnFirstUserTap(), { once: true });

  document.getElementById("reasoningBtn").onclick = () => { renderCaseList(); showPanel("casePanel"); };
  document.getElementById("badgeHallBtn").onclick = () => { buildBadgeHall(); showPanel("badgePanel"); };
  document.getElementById("caseBackBtn").onclick = () => showPanel("mainMenuPanel");
  document.getElementById("badgeBackBtn").onclick = () => showPanel("mainMenuPanel");
  document.getElementById("nextQuizBtn").onclick = nextQuestion;
  document.getElementById("resultMenuBtn").onclick = () => showPanel("mainMenuPanel");
  document.getElementById("resultRetryBtn").onclick = () => { if (gameMode === "casual") startCasual(); else if (gameMode === "case" && currentCase) startCase(currentCase); };
  const doorBox = document.getElementById("doorBox"); doorBox.addEventListener("click", () => { doorBox.classList.add("door-open"); if(soundEnabled) SoundFX.playDoorOpen(); setTimeout(() => { doorBox.style.opacity = "0.3"; doorBox.style.pointerEvents = "none"; }, 700); });
  initOptionButtons(); showPanel("mainMenuPanel");
</script>
</body>
</html>
